version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Tirane
    open-pull-requests-limit: 5
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - '*'
      npm-minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /tools/corpus-indexer
    schedule:
      interval: weekly
      day: tuesday
      time: '06:00'
      timezone: Europe/Tirane
    open-pull-requests-limit: 5
    groups:
      cargo-security:
        applies-to: security-updates
        patterns:
          - '*'
      cargo-minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: '06:00'
      timezone: Europe/Tirane
    open-pull-requests-limit: 3
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - '*'
      actions-minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
